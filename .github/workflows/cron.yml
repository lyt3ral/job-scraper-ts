name: Daily Job Scraper pipeline

on:
  schedule:
    # Run at 00:00 UTC (5:30 AM IST) internally everyday.
    - cron: '0 0 * * *'
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      workday:
        description: 'Run Workday Scraper'
        type: boolean
        default: true
      greenhouse:
        description: 'Run Greenhouse Scraper'
        type: boolean
        default: true
      lever:
        description: 'Run Lever Scraper'
        type: boolean
        default: true
      ashby:
        description: 'Run Ashby Scraper'
        type: boolean
        default: true
      analyze:
        description: 'Run AI Analyzer'
        type: boolean
        default: true
      notify:
        description: 'Run Telegram Notifications'
        type: boolean
        default: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Workday Scraper
        if: github.event_name == 'schedule' || github.event.inputs.workday == 'true'
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: bun run scrape:wd -search "software" -location "India" -posted "1"

      - name: Run Greenhouse Scraper
        if: github.event_name == 'schedule' || github.event.inputs.greenhouse == 'true'
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: bun run scrape:gh -search "Software Engineer" -location "India" -days 1

      - name: Run Lever Scraper
        if: github.event_name == 'schedule' || github.event.inputs.lever == 'true'
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: bun run scrape:lv -search "software" -location "India" -days 1

      - name: Run Ashby Scraper
        if: github.event_name == 'schedule' || github.event.inputs.ashby == 'true'
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: bun run scrape:as -search "software" -location "India" -days 1

      - name: Run AI Analyzer
        if: github.event_name == 'schedule' || github.event.inputs.analyze == 'true'
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: bun run analyze

      - name: Telegram Notifications
        if: github.event_name == 'schedule' || github.event.inputs.notify == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: bun run notify
